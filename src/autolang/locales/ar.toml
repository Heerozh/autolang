"Autolang developer tools." = "أدوات مطور Autolang"
"Could not infer a unique package root from --source. Pass an absolute --locale-dir or narrow --source." = "تعذر استنتاج جذر حزمة فريد من --source. قم بتمرير --locale-dir مطلق أو ضيق --source."
"Create new TOML files for specified locales, and collect tt()-wrapped text templates." = "إنشاء ملفات TOML جديدة للغات المحددة، وجمع قوالب النص الملفوفة بـ tt()."
"Locale files already exist for {', '.join(conflicting_locale_names)} in {locale_dir}. Re-run with --force to replace them." = "ملفات اللغة موجودة بالفعل لـ {', '.join(conflicting_locale_names)} في {locale_dir}. أعد التشغيل باستخدام --force لاستبدالها."
"Missing API key. Pass --api-key or set TT_API_KEY/OPENAI_API_KEY." = "مفتاح API مفقود. مرر --api-key أو عيّن TT_API_KEY/OPENAI_API_KEY."
"Missing cue TOML files for {locale_dir}. Run `tt sync --source {source_path} --locale-dir {locale_dir}` first." = "ملفات TOML للمؤشرات مفقودة لـ {locale_dir}. قم بتشغيل `tt sync --source {source_path} --locale-dir {locale_dir}` أولاً."
"Missing model. Pass --model or set TT_MODEL/OPENAI_MODEL." = "نموذج مفقود. مرر --model أو عيّن TT_MODEL/OPENAI_MODEL."
"Multiple package roots matched the extracted templates. Pass an absolute --locale-dir or narrow --source." = "تطابق جذور حزم متعددة القوالب المستخرجة. قم بتمرير --locale-dir مطلق أو ضيق --source."
"No locale TOML files found in {locale_dir}" = "لم يتم العثور على ملفات TOML للغة في {locale_dir}"
"No locale TOML files found in {locale_dir}. Run `tt init --source {source_path} --locale-dir {locale_dir} --locales <locale>...` first." = "لم يتم العثور على ملفات TOML للغة في {locale_dir}. قم بتشغيل `tt init --source {source_path} --locale-dir {locale_dir} --locales <locale>...` أولاً."
"No translatable template keys found in {locale_dir}." = "لم يتم العثور على قوالب قابلة للترجمة في {locale_dir}."
"Scan project, Sync the tt()-wrapped text, to all locale TOML files." = "مسح المشروع، مزامنة النص المغلف بـ tt()، إلى جميع ملفات TOML المحلية."
"Scanned {scanned_files} Python file(s), initialized {len(locale_names)} locale file(s), created {len(entries)} template entry/entries." = "تم مسح {fmt.decimal(scanned_files)} ملف/ملفات بايثون، وتهيئة {fmt.decimal(len(locale_names))} ملف/ملفات محلية، وإنشاء {fmt.decimal(len(entries))} قالب/قوالب."
"Scanned {scanned_files} Python file(s), synced {len(locale_files)} locale file(s), tracked {len(unique_messages)} template(s), added {total_added_entries} missing entry/entries, removed {total_removed_entries} stale entry/entries." = "تم فحص {fmt.number(scanned_files)} ملف(ملفات) بايثون، ومزامنة {fmt.number(len(locale_files))} ملف(ملفات) محلية، وتتبع {fmt.number(len(unique_messages))} قالب(قوالب)، وإضافة {fmt.number(total_added_entries)} إدخال(إدخالات) مفقود(مفقودة)، وإزالة {fmt.number(total_removed_entries)} إدخال(إدخالات) قديم(قديمة)."
"Source path must be a Python file or directory: {source_path}" = "يجب أن يكون مسار المصدر ملفًا أو دليلًا في Python: {source_path}"
"Source path not found: {source_path}" = "مسار المصدر غير موجود: {source_path}"
"Translate the missing text in all locale TOML language files through an OpenAI-compatible API." = "ترجمة النص المفقود في جميع ملفات لغة TOML المحلية عبر واجهة برمجة تطبيقات متوافقة مع OpenAI."
"Updated {len(target_locales)} locale file(s), translated 0 entry/entries." = "تم تحديث {fmt.number(len(target_locales))} ملف/ملفات لغة، تمت ترجمة 0 إدخال/إدخالات."
"Updated {len(target_locales)} locale file(s), translated {total_translated} entry/entries." = "تم تحديث {fmt.number(len(target_locales))} ملف/ملفات محلية، وترجمة {fmt.number(total_translated)} إدخال/إدخالات."
"Warning: A 'tests' directory was found during source scanning. Did you select the wrong --source directory? " = "تحذير: تم العثور على دليل 'tests' أثناء فحص المصدر. هل اخترت دليل --source الخطأ؟"
